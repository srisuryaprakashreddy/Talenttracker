<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Feedback content fragment -->
<div th:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Candidate Feedback</h1>
            <p class="page-subtitle">Review interviewer evaluations and verdicts</p>
        </div>
        <div sec:authorize="hasAnyRole('ADMIN', 'INTERVIEWER')">
            <a href="/feedback/new" class="btn-add">
                <i class="bi bi-plus-lg"></i> Submit Feedback
            </a>
        </div>
    </div>

    <div class="content-card">
        <!-- Filters -->
        <form class="filters-bar" th:action="@{/feedback}" method="get">
            <div class="search-input">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search feedback…" disabled>
            </div>
            <select class="filter-select" name="verdict" onchange="this.form.submit()">
                <option value="">All Verdicts</option>
                <option value="STRONG_YES" th:selected="${verdictFilter == 'STRONG_YES'}">Strong Yes</option>
                <option value="YES" th:selected="${verdictFilter == 'YES'}">Yes</option>
                <option value="NEUTRAL" th:selected="${verdictFilter == 'NEUTRAL'}">Neutral</option>
                <option value="NO" th:selected="${verdictFilter == 'NO'}">No</option>
                <option value="STRONG_NO" th:selected="${verdictFilter == 'STRONG_NO'}">Strong No</option>
            </select>
        </form>

        <!-- Table -->
        <table class="data-table">
            <thead>
                <tr>
                    <th>Candidate</th>
                    <th>Job Position</th>
                    <th>Interviewer</th>
                    <th>Rating</th>
                    <th>Verdict</th>
                    <th>Comments</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="fb : ${feedbacks}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="avatar-sm"
                                  th:text="${fb.candidateName != null ? fb.candidateName.substring(0,1) : '?'}">R</span>
                            <span th:text="${fb.candidateName}">Ryan O'Brien</span>
                        </div>
                    </td>
                    <td th:text="${fb.jobTitle}">Senior Frontend Developer</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="avatar-sm"
                                  th:text="${fb.interviewerName != null ? fb.interviewerName.substring(0,1) : '?'}">D</span>
                            <span th:text="${fb.interviewerName}">David Park</span>
                        </div>
                    </td>
                    <td>
                        <div class="rating-stars">
                            <i th:each="star : ${#numbers.sequence(1, 5)}"
                               th:classappend="${star <= fb.rating} ? 'bi-star-fill' : 'bi-star'"
                               class="bi"></i>
                        </div>
                    </td>
                    <td>
                        <span class="badge-status"
                              th:classappend="'badge-verdict-' + ${fb.verdict.name().toLowerCase()}"
                              th:text="${fb.verdictLabel}">Yes</span>
                    </td>
                    <td>
                        <span class="text-truncate d-inline-block" style="max-width: 200px;"
                              th:text="${fb.comments}">Strong problem-solving skills.</span>
                    </td>
                    <td th:text="${fb.date}">Apr 10, 2026</td>
                    <td>
                        <a th:href="@{/feedback/{id}(id=${fb.id})}" class="btn-view">View</a>
                    </td>
                </tr>
                <tr th:if="${feedbacks == null or feedbacks.isEmpty()}">
                    <td colspan="8" class="text-center py-4 text-muted">No feedback submitted yet</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</html>
