<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1 class="page-title">Add New Job</h1>
            <p class="page-subtitle">Create a new job posting for recruitment</p>
        </div>
        <a href="/jobs" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Jobs
        </a>
    </div>

    <div class="content-card" style="max-width: 600px;">
        <div class="content-card-body">
            <form th:action="@{/jobs/new}" th:object="${jobRequest}" method="post">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">Job Title *</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" required placeholder="e.g. Senior Frontend Developer">
                </div>
                
                <div class="mb-3">
                    <label for="department" class="form-label fw-bold">Department *</label>
                    <select id="department" th:field="*{department}" class="form-select" required>
                        <option value="">Select Department...</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Product">Product</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="Design">Design</option>
                        <option value="HR">HR</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="location" class="form-label fw-bold">Location *</label>
                    <input type="text" id="location" th:field="*{location}" class="form-control" required placeholder="e.g. San Francisco, CA or Remote">
                </div>
                
                <div class="mb-4">
                    <label for="description" class="form-label fw-bold">Job Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Briefly describe the role and requirements..."></textarea>
                </div>
                
                <div class="d-flex justify-content-end gap-2">
                    <a href="/jobs" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn-add" style="padding: 8px 24px; border: none; border-radius: 8px;">Create Job</button>
                </div>
            </form>
        </div>
    </div>
</div>
</html>
