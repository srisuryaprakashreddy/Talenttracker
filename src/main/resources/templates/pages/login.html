<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — TalentTrack Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </div>
            <h1 class="login-title">TalentTrack Lite</h1>
            <p class="login-subtitle">Sign in to your account</p>

            <!-- Error Message -->
            <div th:if="${param.error}" class="alert-error">
                <i class="bi bi-exclamation-circle me-2"></i>Invalid email or password.
            </div>

            <!-- Logout Success -->
            <div th:if="${param.logout}" class="alert alert-success" style="font-size:14px; border-radius:8px;">
                <i class="bi bi-check-circle me-2"></i>You have been logged out successfully.
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="username"
                           placeholder="your.email@company.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary-custom">Sign In</button>
            </form>

            <div class="mt-4 text-center" style="font-size: 14px;">
                <span>Don't have an account? </span>
                <a th:href="@{/register}" style="color: var(--primary-main); text-decoration: none; font-weight: 500;">Register here</a>
            </div>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <h6>Demo Credentials:</h6>
                <p><strong>Admin:</strong> admin@talenttrack.com</p>
                <p><strong>Recruiter:</strong> recruiter@talenttrack.com</p>
                <p><strong>Interviewer:</strong> interviewer@talenttrack.com</p>
                <p class="mt-2 mb-0" style="font-size:12px; color: var(--text-muted);">Password: 1234</p>
            </div>
        </div>
    </div>
</body>
</html>
