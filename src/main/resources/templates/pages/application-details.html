<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Application Details</h1>
            <p class="page-subtitle">Full application information</p>
        </div>
        <a href="/applications" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="content-card">
                <div class="content-card-header">
                    <h5><i class="bi bi-file-earmark-text"></i> Application #<span th:text="${app.id}">1</span></h5>
                    <span class="badge-status"
                          th:classappend="'badge-' + ${app.status.name().toLowerCase()}"
                          th:text="${app.status.name()}">APPLIED</span>
                </div>
                <div class="content-card-body">
                    <div class="row mb-3">
                        <div class="col-4 text-secondary fw-bold">Candidate</div>
                        <div class="col-8">
                            <a th:href="@{/candidates/{id}(id=${app.candidateId})}" class="btn-view fw-bold" th:text="${app.candidateName}">Alex</a>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4 text-secondary fw-bold">Job Position</div>
                        <div class="col-8">
                            <a th:href="@{/jobs/{id}(id=${app.jobId})}" class="btn-view fw-bold" th:text="${app.jobTitle}">Developer</a>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4 text-secondary fw-bold">Applied Date</div>
                        <div class="col-8" th:text="${app.appliedDate}">Mar 16, 2026</div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4 text-secondary fw-bold">Current Status</div>
                        <div class="col-8">
                            <span class="badge-status"
                                  th:classappend="'badge-' + ${app.status.name().toLowerCase()}"
                                  th:text="${app.status.name()}">APPLIED</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Change Panel -->
        <div class="col-md-4">
            <div class="content-card">
                <div class="content-card-header">
                    <h5><i class="bi bi-arrow-repeat"></i> Update Status</h5>
                </div>
                <div class="content-card-body">
                    <form th:action="@{/applications/{id}/status(id=${app.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">New Status</label>
                            <select name="status" class="form-select" required>
                                <option value="APPLIED" th:selected="${app.status.name() == 'APPLIED'}">Applied</option>
                                <option value="SHORTLISTED" th:selected="${app.status.name() == 'SHORTLISTED'}">Shortlisted</option>
                                <option value="INTERVIEWING" th:selected="${app.status.name() == 'INTERVIEWING'}">Interviewing</option>
                                <option value="OFFERED" th:selected="${app.status.name() == 'OFFERED'}">Offered</option>
                                <option value="HIRED" th:selected="${app.status.name() == 'HIRED'}">Hired</option>
                                <option value="REJECTED" th:selected="${app.status.name() == 'REJECTED'}">Rejected</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-add w-100 justify-content-center">
                            <i class="bi bi-check-circle"></i> Save Status
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
