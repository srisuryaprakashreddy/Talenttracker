<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — TalentTrack Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h1 class="login-title">Join TalentTrack</h1>
            <p class="login-subtitle">Create your account</p>

            <!-- Error Message -->
            <div th:if="${error}" class="alert-error">
                <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}">Error message</span>
            </div>

            <div th:if="${success}" class="alert alert-success" style="font-size:14px; border-radius:8px;">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}">Success message</span>
            </div>

            <!-- Registration Form -->
            <form th:action="@{/register}" th:object="${registerRequest}" method="POST">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" th:field="*{fullName}" 
                           placeholder="John Doe" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" 
                           placeholder="john.doe@company.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" 
                           placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label">Desired Role</label>
                    <select class="form-select" th:field="*{role}" required>
                        <option value="" disabled selected>Select your role...</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button type="submit" class="btn-primary-custom">Register</button>
            </form>

            <div class="demo-credentials mt-4" style="background: transparent; border: none; padding: 0;">
                <p class="mb-0" style="font-size:14px;">Already have an account? <a th:href="@{/login}" style="color: var(--primary-main); text-decoration: none; font-weight: 500;">Sign In</a></p>
            </div>
        </div>
    </div>
</body>
</html>
