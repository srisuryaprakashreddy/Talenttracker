<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4 border-bottom pb-4">
        <div class="d-flex align-items-center gap-3">
            <div class="avatar-lg shadow-sm" style="width: 72px; height: 72px; font-size: 28px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-radius: 20px;">
                <i class="bi bi-chat-square-text"></i>
            </div>
            <div>
                <h1 class="page-title mb-1" style="font-weight: 700; color: #1e293b;">Candidate Feedback</h1>
                <p class="page-subtitle mb-0 text-muted">Submitted on <span th:text="${feedback.date}">Date</span></p>
            </div>
        </div>
        <div class="d-flex gap-2">
            <form th:action="@{/feedback/{id}/delete(id=${feedback.id})}" method="post" 
                  class="d-inline" sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                  onsubmit="return confirm('Delete this feedback permanently?')">
                <button type="submit" class="btn btn-outline-danger" style="border-radius: 8px;">
                    <i class="bi bi-trash3"></i> Delete
                </button>
            </form>
            <a href="/feedback" class="btn btn-outline-secondary" style="border-radius: 8px;">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="content-card shadow-sm border-0 h-100" style="border-radius: 12px;">
                <div class="content-card-header bg-transparent border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold" style="color: #334155;"><i class="bi bi-person-bounding-box text-primary me-2"></i> Evaluation Summary</h5>
                    <span class="badge-status fs-6 px-3 py-2 shadow-sm border" th:classappend="'badge-verdict-' + ${feedback.verdict.name().toLowerCase()}" th:text="${feedback.verdictLabel}">YES</span>
                </div>
                
                <div class="content-card-body p-4">
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <div class="p-3 bg-light rounded-3 border h-100">
                                <small class="text-uppercase text-muted fw-bold d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Candidate</small>
                                <h4><a th:href="@{/candidates/{id}(id=${feedback.candidateId})}" th:text="${feedback.candidateName}" class="text-decoration-none text-dark fw-bold">Name</a></h4>
                                <div class="mt-2 text-muted" style="font-size: 0.85rem;">
                                    For position: <a th:href="@{/jobs/{id}(id=${feedback.jobId})}" th:text="${feedback.jobTitle}" class="text-decoration-none fw-bold">Role</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 bg-light rounded-3 border h-100">
                                <small class="text-uppercase text-muted fw-bold d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Interviewer</small>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-sm me-2 bg-success text-white" th:text="${feedback.interviewerName.substring(0,1)}">I</div>
                                    <span th:text="${feedback.interviewerName}" class="fw-bold fs-5 text-dark">Interviewer</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex align-items-center justify-content-between p-3 bg-white border rounded-3 border-start border-4 border-warning shadow-sm">
                            <span class="text-uppercase text-muted fw-bold mb-0" style="font-size: 0.85rem; letter-spacing: 0.5px;">Technical Rating</span>
                            <div class="rating-stars fs-4" style="color: #fbbf24;">
                                <i th:each="star : ${#numbers.sequence(1, 5)}"
                                   th:classappend="${star <= feedback.rating} ? 'bi-star-fill' : 'bi-star'"
                                   class="bi"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-12 mt-4">
            <div class="content-card shadow-sm border-0" style="border-radius: 12px; background: linear-gradient(to bottom right, #ffffff, #f8fafc);">
                <div class="content-card-header bg-transparent pt-4 pb-0 px-4 border-0">
                    <h5 class="mb-0 fw-bold" style="color: #334155;"><i class="bi bi-card-text text-secondary me-2"></i> Detailed Comments</h5>
                </div>
                <div class="content-card-body p-4">
                    <div class="p-4 bg-white rounded-3 shadow-sm" style="border: 1px solid #e2e8f0; position: relative;">
                        <i class="bi bi-quote position-absolute text-light" style="font-size: 4rem; top: -10px; left: 10px; opacity: 0.5;"></i>
                        <p style="white-space: pre-wrap; font-size: 1.05rem; line-height: 1.8; color: #475569; position: relative; z-index: 1;" class="mb-0" th:text="${feedback.comments}">Comments go here...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
