<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div class="content-card text-center" style="margin-top: 50px; padding: 50px;">
        <h1 class="page-title text-danger" style="font-size: 3rem;">Error</h1>
        <p class="page-subtitle mb-4">Something went wrong while processing your request.</p>
        
        <div class="alert alert-warning d-inline-block" style="text-align: left; max-width: 600px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}">Error details</span>
        </div>
        
        <div class="mt-4">
            <a href="/dashboard" class="btn btn-primary" style="background-color: var(--primary-color); border-radius: 8px;">
                <i class="bi bi-house"></i> Return to Dashboard
            </a>
            <button onclick="history.back()" class="btn btn-light ms-2" style="border-radius: 8px;">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>
        </div>
    </div>
</div>
</html>
