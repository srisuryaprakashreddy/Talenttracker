<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Candidates content fragment -->
<div th:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Candidates</h1>
            <p class="page-subtitle">Manage candidate profiles and track their progress</p>
        </div>
        <a href="/candidates/new" class="btn-add" sec:authorize="hasAnyRole('ADMIN','RECRUITER')">
            <i class="bi bi-plus-lg"></i> Add Candidate
        </a>
    </div>

    <div class="content-card">
        <!-- Filters -->
        <form class="filters-bar" th:action="@{/candidates}" method="get">
            <div class="search-input">
                <i class="bi bi-search"></i>
                <input type="text" name="name" placeholder="Search by name…" th:value="${nameFilter}">
            </div>
            <input type="text" name="skill" class="filter-select" placeholder="Filter by skill…" th:value="${skillFilter}" style="min-width:160px;">
            <button type="submit" class="btn-add" style="padding:8px 14px;"><i class="bi bi-funnel"></i> Filter</button>
        </form>

        <!-- Table -->
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Skills</th>
                    <th>Applications</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="candidate : ${candidates}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="avatar-sm" th:text="${candidate.fullName != null ? candidate.fullName.substring(0,1) : '?'}">A</span>
                            <strong th:text="${candidate.fullName}">Alex Thompson</strong>
                        </div>
                    </td>
                    <td th:text="${candidate.email}">alex@example.com</td>
                    <td th:text="${candidate.phone}">+1-555-0101</td>
                    <td>
                        <span class="skill-tag" th:each="skill : ${candidate.skillList}"
                              th:text="${skill}">React</span>
                    </td>
                    <td th:text="${candidate.applicationCount} ?: '0'">2</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <a th:href="@{/candidates/{id}(id=${candidate.id})}" class="btn-view">View</a>
                            <form th:action="@{/candidates/{id}/delete(id=${candidate.id})}" method="post"
                                  class="d-inline" sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                                  onsubmit="return confirm('Delete this candidate permanently?')">
                                <button type="submit" class="btn-delete"><i class="bi bi-trash3"></i></button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${candidates == null or candidates.isEmpty()}">
                    <td colspan="6" class="text-center py-4 text-muted">No candidates found</td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination-wrapper" th:if="${totalPages > 1}">
            <div class="pagination-info">
                Showing page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">5</span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/candidates(page=${currentPage - 1}, name=${nameFilter}, skill=${skillFilter})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/candidates(page=${i}, name=${nameFilter}, skill=${skillFilter})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/candidates(page=${currentPage + 1}, name=${nameFilter}, skill=${skillFilter})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</html>
