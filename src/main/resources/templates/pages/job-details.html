<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4 border-bottom pb-4">
        <div>
            <div class="d-flex align-items-center gap-3">
                <div class="avatar-lg" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); width: 60px; height: 60px; font-size: 28px; display: flex; align-items: center; justify-content: center; color: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);">
                    <i class="bi bi-briefcase-fill" style="font-size: 24px;"></i>
                </div>
                <div>
                    <h1 class="page-title mb-1" th:text="${job.title}" style="font-weight: 700; color: #1e293b;">Job Title</h1>
                    <p class="page-subtitle mb-0">
                        <span class="badge bg-light text-dark border me-2"><i class="bi bi-building me-1 text-primary"></i> <span th:text="${job.department}">Department</span></span>
                        <span class="badge bg-light text-dark border"><i class="bi bi-geo-alt me-1 text-danger"></i> <span th:text="${job.location}">Location</span></span>
                    </p>
                </div>
            </div>
        </div>
        <div class="d-flex gap-2">
           <a href="/jobs/new" class="btn btn-primary" sec:authorize="hasAnyRole('ADMIN', 'RECRUITER')">
               <i class="bi bi-pencil-square"></i> Edit
           </a>
           <a href="/jobs" class="btn btn-outline-secondary" style="border-radius: 8px;">
               <i class="bi bi-arrow-left"></i> Back
           </a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="content-card h-100 shadow-sm border-0" style="border-radius: 12px;">
                <div class="content-card-header bg-transparent border-bottom-0 pt-4 pb-0 px-4">
                    <h4 class="mb-0 fw-bold" style="color: #334155;"><i class="bi bi-card-text text-primary me-2"></i> Description</h4>
                </div>
                <div class="content-card-body p-4">
                    <div class="bg-light p-4 rounded-3" style="border: 1px solid #e2e8f0;">
                       <p style="white-space: pre-wrap; line-height: 1.8; color: #475569; font-size: 1.05rem;" class="mb-0" th:text="${job.description}">Job description goes here...</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="content-card mb-4 shadow-sm border-0" style="border-radius: 12px; background: linear-gradient(to bottom right, #ffffff, #f8fafc);">
                <div class="content-card-header bg-transparent pt-4 pb-3 px-4 border-bottom">
                    <h5 class="mb-0 fw-bold" style="color: #334155;"><i class="bi bi-info-circle text-info me-2"></i> Overview</h5>
                </div>
                <div class="content-card-body p-4">
                    <div class="d-flex align-items-center mb-4">
                        <div class="flex-shrink-0 bg-light rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="bi bi-activity text-primary fs-4"></i>
                        </div>
                        <div class="ms-3">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.5px;">Status</small>
                            <span class="badge-status mt-1" th:classappend="'badge-' + ${job.status.name().toLowerCase()}" th:text="${job.status.name()}" style="font-size: 0.85rem; padding: 6px 12px;">OPEN</span>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center mb-4">
                        <div class="flex-shrink-0 bg-light rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="bi bi-people text-success fs-4"></i>
                        </div>
                        <div class="ms-3">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.5px;">Total Applications</small>
                            <span class="fw-bold fs-4 text-dark" th:text="${job.applicationCount}">0</span>
                        </div>
                    </div>

                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-light rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="bi bi-calendar-check text-warning fs-4"></i>
                        </div>
                        <div class="ms-3">
                            <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.5px;">Created On</small>
                            <span class="fw-bold text-dark" th:text="${job.formattedDate}">Jan 1, 2026</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <a href="/applications/new" class="btn btn-primary w-100 py-3 shadow-sm" style="border-radius: 12px; font-weight: 600;" sec:authorize="hasAnyRole('ADMIN', 'RECRUITER')">
                <i class="bi bi-person-plus-fill me-2"></i> Assign Candidate
            </a>
        </div>
    </div>
</div>
</html>
