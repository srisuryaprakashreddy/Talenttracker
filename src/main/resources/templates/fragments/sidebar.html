<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Sidebar Fragment -->
<nav th:fragment="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i class="bi bi-grid-3x3-gap-fill"></i>
        </div>
        <span class="sidebar-brand-text">TalentTrack Lite</span>
    </div>

    <div class="sidebar-nav">
        <a href="/dashboard" class="sidebar-nav-item" data-page="dashboard">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="/jobs" class="sidebar-nav-item" data-page="jobs">
            <i class="bi bi-briefcase-fill"></i> Jobs
        </a>
        <a href="/candidates" class="sidebar-nav-item" data-page="candidates">
            <i class="bi bi-people-fill"></i> Candidates
        </a>
        <a href="/applications" class="sidebar-nav-item" data-page="applications">
            <i class="bi bi-file-earmark-text-fill"></i> Applications
        </a>
        <a href="/interviews" class="sidebar-nav-item" data-page="interviews">
            <i class="bi bi-calendar-event-fill"></i> Interviews
        </a>
        <a href="/feedback" class="sidebar-nav-item" data-page="feedback">
            <i class="bi bi-chat-square-text-fill"></i> Feedback
        </a>

        <div sec:authorize="hasAnyRole('ADMIN','RECRUITER')">
            <div class="sidebar-divider"></div>
            <a href="/reports" class="sidebar-nav-item" data-page="reports">
                <i class="bi bi-bar-chart-line-fill"></i> Reports
            </a>
            <a href="/users" class="sidebar-nav-item" data-page="users">
                <i class="bi bi-person-gear"></i> Users
            </a>
        </div>
    </div>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="sidebar-nav-item border-0 w-100 text-start" style="background: transparent;">
                <i class="bi bi-box-arrow-left"></i> Logout
            </button>
        </form>
    </div>
</nav>

</html>
