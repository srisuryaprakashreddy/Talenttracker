spring.application.name=TalentTrack Lite

# ── DataSource ───────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/talenttrack}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:185085}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── JWT Configuration ───────────────────────────────────
app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration=86400000

# ── Server ──────────────────────────────────────────────
server.port=8081

# ── Logging (suppress intentional Spring Security warning) ──
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
